<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>

  <!-- ✅ Google Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <style>
    /* ---------- Theme Variables ---------- */
    :root {
      --primary-color: #ff7043;
      --on-primary: #fff;
      --surface: #ffffff;
      --on-surface: #333;
      --background: #f7f7f7;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    [data-theme="dark"] {
      --primary-color: #ff8a50;
      --on-primary: #fff;
      --surface: #2b2b2b;
      --on-surface: #f2f2f2;
      --background: #1e1e1e;
      --shadow: rgba(0, 0, 0, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.25s, color 0.25s;
    }

    body {
      font-family: "Roboto", "Segoe UI", sans-serif;
      background-color: var(--background);
      color: var(--on-surface);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ---------- AppBar ---------- */
    header {
      background-color: var(--primary-color);
      color: var(--on-primary);
      padding: 16px;
      font-size: 1.2rem;
      font-weight: 500;
      text-align: center;
      box-shadow: 0 2px 6px var(--shadow);
      position: relative;
    }

    /* ---------- Theme Toggle ---------- */
    .theme-toggle {
      position: absolute;
      top: 10px;
      right: 16px;
      background: var(--surface);
      border: none;
      border-radius: 18px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--on-surface);
      box-shadow: 0 2px 6px var(--shadow);
      transition: background-color 0.3s, color 0.3s;
    }

    .theme-toggle:hover {
      background-color: var(--primary-color);
      color: var(--on-primary);
    }

    /* ---------- Main Body ---------- */
    main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .settings-list {
      list-style: none;
    }

    .setting-item {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 4px var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .setting-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--on-surface);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--primary-color);
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .dropdown {
      background: var(--surface);
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 1rem;
      color: var(--on-surface);
      cursor: pointer;
    }

    .clear-data-btn {
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    .clear-data-btn:hover {
      background: #c82333;
    }

    /* ---------- Dialog ---------- */
    .dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .dialog {
      background: var(--surface);
      border-radius: 12px;
      padding: 20px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 4px 8px var(--shadow);
    }

    .dialog-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 12px;
      color: var(--on-surface);
    }

    .dialog-content {
      margin-bottom: 20px;
      color: var(--on-surface);
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .dialog-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    .dialog-btn.cancel {
      background: #6c757d;
      color: white;
    }

    .dialog-btn.confirm {
      background: #dc3545;
      color: white;
    }

    /* ---------- Snackbar ---------- */
    .snackbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--on-surface);
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 4px 8px var(--shadow);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    .snackbar.show {
      opacity: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .setting-item {
      animation: fadeIn 0.3s ease-in-out;
    }
  </style>
</head>

<body>

  <!-- ---------- AppBar ---------- -->
  <header>
    <span>Settings ⚙️</span>
    <button id="theme-toggle" class="theme-toggle">🌙 Dark</button>
  </header>

  <!-- ---------- Main Content ---------- -->
  <main>
    <ul class="settings-list">
      <li class="setting-item">
        <span class="setting-title">Dark Mode</span>
        <label class="switch">
          <input type="checkbox" id="dark-mode-toggle">
          <span class="slider"></span>
        </label>
      </li>
      <li class="setting-item">
        <span class="setting-title">Notifications</span>
        <label class="switch">
          <input type="checkbox" id="notifications-toggle">
          <span class="slider"></span>
        </label>
      </li>
      <li class="setting-item">
        <span class="setting-title">Language</span>
        <select class="dropdown" id="language-select">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
        </select>
      </li>
      <li class="setting-item">
        <button class="clear-data-btn" id="clear-data-btn">
          <span class="material-symbols-outlined">delete_forever</span>
          Clear All Data
        </button>
      </li>
    </ul>
  </main>

  <!-- ---------- Dialog ---------- -->
  <div class="dialog-overlay" id="dialog-overlay">
    <div class="dialog">
      <div class="dialog-title">Clear All Data</div>
      <div class="dialog-content">Are you sure you want to clear all data?</div>
      <div class="dialog-actions">
        <button class="dialog-btn cancel" id="dialog-cancel">Cancel</button>
        <button class="dialog-btn confirm" id="dialog-confirm">Clear</button>
      </div>
    </div>
  </div>

  <!-- ---------- Snackbar ---------- -->
  <div class="snackbar" id="snackbar"></div>

  <!-- ---------- Script Logic ---------- -->
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    const darkModeToggle = document.getElementById('dark-mode-toggle');
    const notificationsToggle = document.getElementById('notifications-toggle');
    const languageSelect = document.getElementById('language-select');
    const clearDataBtn = document.getElementById('clear-data-btn');
    const dialogOverlay = document.getElementById('dialog-overlay');
    const dialogCancel = document.getElementById('dialog-cancel');
    const dialogConfirm = document.getElementById('dialog-confirm');
    const snackbar = document.getElementById('snackbar');

    // Settings storage (in real app, use localStorage or API)
    let settings = JSON.parse(localStorage.getItem('settings')) || {
      isDarkMode: false,
      notificationsEnabled: true,
      language: 'en'
    };

    // Theme Toggle
    let darkMode = settings.isDarkMode;
    function updateTheme() {
      if (darkMode) {
        body.setAttribute('data-theme', 'dark');
        themeToggle.textContent = '☀️ Light';
      } else {
        body.removeAttribute('data-theme');
        themeToggle.textContent = '🌙 Dark';
      }
    }
    updateTheme();

    themeToggle.addEventListener('click', () => {
      darkMode = !darkMode;
      settings.isDarkMode = darkMode;
      saveSettings();
      updateTheme();
    });

    // Dark Mode Toggle
    darkModeToggle.checked = settings.isDarkMode;
    darkModeToggle.addEventListener('change', (e) => {
      settings.isDarkMode = e.target.checked;
      darkMode = e.target.checked;
      saveSettings();
      updateTheme();
    });

    // Notifications Toggle
    notificationsToggle.checked = settings.notificationsEnabled;
    notificationsToggle.addEventListener('change', (e) => {
      settings.notificationsEnabled = e.target.checked;
      saveSettings();
    });

    // Language Select
    languageSelect.value = settings.language;
    languageSelect.addEventListener('change', (e) => {
      settings.language = e.target.value;
      saveSettings();
    });

    // Clear Data
    clearDataBtn.addEventListener('click', () => {
      dialogOverlay.style.display = 'flex';
    });

    dialogCancel.addEventListener('click', () => {
      dialogOverlay.style.display = 'none';
    });

    dialogConfirm.addEventListener('click', () => {
      // Clear all data (in real app, clear localStorage, etc.)
      localStorage.clear();
      settings = { isDarkMode: false, notificationsEnabled: true, language: 'en' };
      darkMode = false;
      updateTheme();
      darkModeToggle.checked = false;
      notificationsToggle.checked = true;
      languageSelect.value = 'en';
      dialogOverlay.style.display = 'none';
      showSnackbar('All data cleared');
    });

    function saveSettings() {
      localStorage.setItem('settings', JSON.stringify(settings));
    }

    function showSnackbar(message) {
      snackbar.textContent = message;
      snackbar.classList.add('show');
      setTimeout(() => {
        snackbar.classList.remove('show');
      }, 3000);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      // Any additional initialization
    });
  </script>
</body>
</html>
