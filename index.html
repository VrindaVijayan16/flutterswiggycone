<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiggy Cone</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #e65100, #ffa726);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      animation: fadeIn 2s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 20px;
    }

    img.logo {
      width: 150px;
      border-radius: 16px;
    }

    h1 {
      font-size: 36px;
      font-weight: bold;
      margin: 10px 0;
      letter-spacing: 1.5px;
    }

    p.tagline {
      font-size: 18px;
      color: #fff8e1;
      margin-bottom: 20px;
    }

    .carousel {
      position: relative;
      width: 100%;
      height: 160px;
      overflow: hidden;
      border-radius: 16px;
      margin-bottom: 10px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    }

    .carousel img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: none;
      border-radius: 16px;
    }

    .carousel img.active {
      display: block;
    }

    .dots {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      margin: 0 4px;
      transition: background-color 0.3s;
    }

    .dot.active {
      background-color: #d84315;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: #fff;
      color: #d84315;
      border: none;
      padding: 14px 32px;
      border-radius: 16px;
      font-size: 18px;
      cursor: pointer;
      margin: 12px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.4);
    }

    .form-card {
      background-color: white;
      color: #000;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      margin-top: 30px;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .form-card h2 {
      color: #d84315;
      font-size: 24px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    .form-card button {
      background-color: #d84315;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }

    .toggle-link {
      background: none;
      border: none;
      color: #d84315;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/images/ice.jpeg" alt="Logo" class="logo">
    <h1>Swiggy Cone</h1>
    <p class="tagline">Delicious cones delivered to your door 🚚</p>

    <div class="carousel">
      <img src="https://cdn.dribbble.com/userupload/18761618/file/original-1a75b6dc31ce1a743c28ef9613deef0e.jpg?resize=1024x819&vertical=center" class="active">
      <img src="https://img.freepik.com/premium-psd/delicious-icecream-social-media-web-banner-design_440834-1419.jpg">

    </div>

    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <button class="btn" onclick="window.location.href='userhomepage.html'">
      👤 Continue as Guest
    </button>

    <button class="btn" onclick="toggleUserForm()">
      🔐 Login / Register
    </button>

    <button class="btn" onclick="toggleAdminForm()">
      ⚙️ Admin Login
    </button>

    <!-- User Form -->
    <div class="form-card" id="userForm">
      <h2 id="userFormTitle">Login</h2>
      <input type="email" id="userEmail" placeholder="Email" />
      <input type="password" id="userPassword" placeholder="Password" />
      <button id="userActionButton" onclick="handleUserAuth()">Login</button>
      <button class="toggle-link" onclick="switchUserForm()">Create Account</button>
    </div>

    <!-- Admin Form -->
    <div class="form-card" id="adminForm">
      <h2>Admin Login</h2>
      <input type="email" id="adminEmail" value="admin@swiggycone.com" />
      <input type="password" id="adminPassword" value="admin123" />
      <button onclick="adminLogin()">Login</button>
    </div>
  </div>

  <script>
    // 🎠 Carousel
    let currentSlide = 0;
    const slides = document.querySelectorAll('.carousel img');
    const dots = document.querySelectorAll('.dot');

    function showSlide(index) {
      slides.forEach((img, i) => img.classList.toggle('active', i === index));
      dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }

    setInterval(() => {
      currentSlide = (currentSlide + 1) % slides.length;
      showSlide(currentSlide);
    }, 3000);

    // 🔐 User login/register
    let isLoginMode = true;

    function toggleUserForm() {
      document.getElementById('adminForm').style.display = 'none';
      const form = document.getElementById('userForm');
      form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }

    function switchUserForm() {
      isLoginMode = !isLoginMode;
      document.getElementById('userFormTitle').textContent = isLoginMode ? 'Login' : 'Register';
      document.getElementById('userActionButton').textContent = isLoginMode ? 'Login' : 'Register';
      document.querySelector('.toggle-link').textContent = isLoginMode ? 'Create Account' : 'Already have an account?';
      document.getElementById('userEmail').value = '';
      document.getElementById('userPassword').value = '';
    }

    function handleUserAuth() {
      const email = document.getElementById('userEmail').value.trim();
      const password = document.getElementById('userPassword').value.trim();

      if (!email || !password) {
        alert("Please fill all fields.");
        return;
      }

      if (isLoginMode) {
        const savedEmail = localStorage.getItem('userEmail');
        const savedPass = localStorage.getItem('userPass');

        if (email === savedEmail && password === savedPass) {
          alert("Login successful!");
          window.location.href = 'userhomepage.html';
        } else {
          alert("Invalid credentials. Please register first.");
        }
      } else {
        localStorage.setItem('userEmail', email);
        localStorage.setItem('userPass', password);
        alert("Registered successfully! Please login now.");
        switchUserForm();
      }
    }

    // ⚙️ Admin login logic
    function toggleAdminForm() {
      document.getElementById('userForm').style.display = 'none';
      const adminForm = document.getElementById('adminForm');
      adminForm.style.display = adminForm.style.display === 'block' ? 'none' : 'block';
    }

    function adminLogin() {
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value.trim();

      if (email === "admin@swiggycone.com" && password === "admin123") {
        window.location.href = "adminhomepage.html";
      } else {
        alert("Invalid admin credentials.");
      }
    }
  
  </script>
</body>
</html>
